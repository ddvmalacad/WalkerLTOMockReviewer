<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTO Mock Exam Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>LTO Mock Exam Portal</h1>
            <p class="subtitle">Land Transportation Office Licensing Reviewer</p>
        </header>

        <section id="auth-stage">
            <div class="form-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" placeholder="e.g., Juan Dela Cruz" required>
            </div>

            <div class="form-group">
                <label for="userage">Age</label>
                <input type="number" id="userage" placeholder="e.g., 25" min="16" required>
            </div>

            <div class="form-group">
                <label for="learning-status">Application Type</label>
                <select id="learning-status">
                    <option value="student">Student Permit / Non-Professional License (60 Items)</option>
                    <option value="driver">Professional License / Renewal (25 Items)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="exam-lang">Preferred Language</label>
                <select id="exam-lang">
                    <option value="en">English</option>
                    <option value="tl">Tagalog (Filipino)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="exam-topic">Focus Category</label>
                <select id="exam-topic">
                    <option value="all">All Topics (Full Balanced Exam)</option>
                    <option value="Road Signs and Pavement Markings">Road Signs and Pavement Markings</option>
                    <option value="Road and Traffic Rules">Road and Traffic Rules</option>
                    <option value="Safe Driving Principles">Safe Driving Principles</option>
                    <option value="Land Transportation Laws and Violations">Land Transportation Laws and Violations</option>
                    <option value="Licensing Information and General Knowledge">Licensing Information and General Knowledge</option>
                    <option value="Vehicle Maintenance and Troubleshooting">Vehicle Maintenance and Troubleshooting</option>
                </select>
            </div>

            <button id="start-btn">Initialize Exam Session</button>
        </section>

        <section id="exam-stage" class="hidden">
            <div class="progress-container" style="background: var(--border); height: 4px; border-radius: 2px; margin-bottom: 1.5rem; position: relative; overflow: hidden;">
                <div id="progress-bar" style="background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease;"></div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <span id="question-counter" style="font-size: 0.875rem; font-weight: 600; color: var(--text-muted);">Question 1 of --</span>
                <span id="exam-timer" style="font-size: 0.875rem; font-weight: 700; color: var(--accent);">60:00</span>
            </div>

            <div class="question-card">
                <p class="question-text" id="question-display">Loading core validation parameters...</p>
                
                <div class="options-list" id="options-display">
                    </div>
            </div>

            <button id="next-btn" class="hidden" style="margin-top: 1.5rem; background-color: var(--accent);">Proceed to Next Item</button>
        </section>

        <section id="results-stage" class="hidden">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem;">Exam Complete</h2>
                <div style="font-size: 3.5rem; font-weight: 700; color: var(--success); margin: 0 auto; text-align: center;" id="score-display">0/0</div>
                <p id="passing-status" style="font-weight: 600; margin-top: 0.5rem;"></p>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 1.5rem;">

            <div>
                <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--primary-light); margin-bottom: 1rem;">Analytical Weakness Matrix</h3>
                <div id="performance-matrix" style="display: flex; flex-direction: column; gap: 0.75rem;">
                    </div>
            </div>

            <button id="restart-btn" style="margin-top: 2rem;">Return to Dashboard</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
